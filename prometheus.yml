global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'user_service'
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'search_service'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8002']